[theme]
primaryColor = "#1f4e79"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f4f8"
textColor = "#1a1a2e"
font = "sans serif"
# Calibri/Segoe aplicadas via CSS em ui.py (aplicar_estilo)

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
runOnSave = true
fileWatcherType = "auto"

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501
